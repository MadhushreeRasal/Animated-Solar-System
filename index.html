<!DOCTYPE html>
<html>
	<head>
		<meta charset="UTF-8">
		<meta name="viewport" content="width=device-width, initial-scale=1.0">
		<meta name="description" content="A animated solar system model demonstrating how our solar system works. The website consists of all the 8 planets , sun and the satellite of earth - the moon.">
		<meta name="keywords" content="solar system, planets, sun, mercury, venus, earth, moon, mars, jupiter, saturn, uranus, neptune, live model of solar system, solar system working model, rotation, rotation in solar system, revolution, revolution in solar system, orbits.">
		<meta name="author" content="Madhushree Rasal">
		<title>Solar System</title>
		<link rel="stylesheet" href="solar system.css">
	</head>
	<body>
		<!-- Header -->
		<header>
			<h1>SOLAR SYSTEM</h1>
		</header>
		
		<!-- Solar system -->
		<section class="solar-system">
			<img src="images/sun.png" alt="sun" class="sun rotate-planets">
			
			<div class="orbit mercury-orbit">
				<img src="images/mercury.png" class="planet rotate-planets mercury" alt="mercury">
			</div>
			
			<div class="orbit venus-orbit">
				<img src="images/venus.png" alt="venus" class="planet venus rotate-planets">
			</div>
			
			<div class="orbit earth-orbit">	
				<div class="earth">
					<img src="images/earth-img.png" alt="earth" class="earth-img">
					<div class="moon-orbit">
						<img src="images/moon.png" alt="moon" class="moon">
					</div>
				</div>
			</div>
			
			<div class="orbit mars-orbit">
				<img src="images/mars.png" alt="mars" class="planet mars rotate-planets">
			</div>
			
			<div class="orbit jupiter-orbit">
				<img src="images/jupiter.png" alt="jupiter" class="planet jupiter rotate-planets">
			</div>
			
			<div class="orbit saturn-orbit">
				<img src="images/saturn.png" alt="saturn" class="planet">
			</div>
			
			<div class="orbit uranus-orbit">
				<img src="images/uranus.png" alt="uranus" class="planet uranus rotate-planets">
			</div>
			
			<div class="orbit neptune-orbit">
				<img src="images/neptune.png" alt="neptune" class="planet rotate-planets">
			</div>
		</section>
		
	</body>
</html>
